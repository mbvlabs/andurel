name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.26.5'
  GORELEASER_VERSION: 'v2.17.0'
  GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
  SIGNING_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release.yml@${{ github.ref }}

jobs:
  tag-identity:
    name: Verify release tag identity
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read

    steps:
      - name: Check out the exact tag commit
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag and checkout identity
        shell: bash
        run: ./scripts/verify-release-tag.sh "${GITHUB_REF_NAME}" "${GITHUB_SHA}"

      - name: Verify post-merge readiness for the tagged commit
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          record="$(gh run list \
            --workflow release-readiness.yml \
            --branch master \
            --commit "${GITHUB_SHA}" \
            --event push \
            --status success \
            --limit 1 \
            --json databaseId,headBranch,headSha,event,conclusion,url \
            --jq '.[] | [.databaseId, .headBranch, .headSha, .event, .conclusion, .url] | @tsv')"
          if [[ -z "${record}" ]]; then
            echo "${GITHUB_SHA} has no successful post-merge Release Readiness run on master." >&2
            exit 1
          fi
          IFS=$'\t' read -r run_id run_branch run_sha run_event run_conclusion run_url <<< "${record}"
          if [[ "${run_branch}" != master || "${run_sha}" != "${GITHUB_SHA}" || \
            "${run_event}" != push || "${run_conclusion}" != success ]]; then
            echo "Release Readiness result does not match the tagged master commit: ${record}" >&2
            exit 1
          fi
          echo "Verified Release Readiness run ${run_id}: ${run_url}"

  artifact-preflight:
    name: Release artifact preflight
    needs: tag-identity
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/release-artifact-preflight.yml
    with:
      checkout_ref: ${{ github.sha }}
      release_tag: ${{ github.ref_name }}
      artifact_name: ${{ format('preflight-release-assets-{0}', github.sha) }}

  draft-release:
    name: Create signed private draft
    needs: artifact-preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out the validated tag commit
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Reverify release tag identity before draft creation
        shell: bash
        run: ./scripts/verify-release-tag.sh "${GITHUB_REF_NAME}" "${GITHUB_SHA}"

      - name: Set up pinned Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
          cache: true
          cache-dependency-path: go.sum

      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1, Cosign v3.0.5

      - name: Install pinned Syft
        uses: anchore/sbom-action/download-syft@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1, Syft v1.42.2

      - name: Refuse to replace an existing release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "A release already exists for ${GITHUB_REF_NAME}; refusing to replace it." >&2
            exit 1
          fi

      - name: Check GoReleaser configuration
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: check

      - name: Create signed private draft with GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Sign and upload the SBOM checksum manifest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          find dist -maxdepth 1 -type f -name '*.sbom.json' -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#  dist/#  #' > dist/sbom-checksums.txt
          cosign sign-blob \
            --bundle dist/sbom-checksums.txt.sigstore.json \
            --yes \
            dist/sbom-checksums.txt
          gh release upload "${GITHUB_REF_NAME}" \
            dist/sbom-checksums.txt \
            dist/sbom-checksums.txt.sigstore.json

      - name: Attest release archives
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-checksums: dist/checksums.txt

      - name: Attest release SBOMs
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-checksums: dist/sbom-checksums.txt

      - name: Confirm release preparation did not mutate tracked source
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- .
          git diff --cached --exit-code -- .

  exact-artifact-smoke:
    name: Exact release smoke ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: draft-release
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
          - goos: darwin
            goarch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Check out smoke-test fixtures
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1, Cosign v3.0.5

      - name: Download exact draft assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir release-assets
          gh release download "${GITHUB_REF_NAME}" --dir release-assets

      - name: Install and smoke-test exact release archive
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="release-assets/andurel_${version}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          ./scripts/smoke-release-archive.sh "${archive}" "${GITHUB_REF_NAME}" release-assets
          gh attestation verify "${archive}" --repo "${GITHUB_REPOSITORY}"
          gh attestation verify "${archive}.sbom.json" --repo "${GITHUB_REPOSITORY}"

  publish:
    name: Publish verified release
    needs: exact-artifact-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out the exact tag commit
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Publish only the verified draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ./scripts/verify-release-tag.sh "${GITHUB_REF_NAME}" "${GITHUB_SHA}"
          test "$(gh release view "${GITHUB_REF_NAME}" --json isDraft --jq .isDraft)" = "true"
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            gh release edit "${GITHUB_REF_NAME}" --draft=false --prerelease
          else
            gh release edit "${GITHUB_REF_NAME}" --draft=false --prerelease=false
          fi
