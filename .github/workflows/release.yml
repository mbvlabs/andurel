name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.26.5'
  GORELEASER_VERSION: 'v2.17.0'
  GOLANGCI_LINT_VERSION: 'v2.12.2'
  GOVULNCHECK_VERSION: 'v1.3.0'
  APIDIFF_VERSION: 'v0.0.0-20250620022241-b7579e27df2b'
  SIGNING_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release.yml@${{ github.ref }}

jobs:
  validate:
    name: Validate exact tag commit
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17.5-alpine3.22
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb?sslmode=disable

    steps:
      - name: Check out the exact tag commit
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag and checkout identity
        shell: bash
        run: ./scripts/verify-release-tag.sh "${GITHUB_REF_NAME}" "${GITHUB_SHA}"

      - name: Set up pinned Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
          cache: true
          cache-dependency-path: go.sum

      - name: Install pinned validation tools
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/a-h/templ/cmd/templ@v0.3.1020
          go install github.com/segmentio/golines@v0.13.0
          go install golang.org/x/tools/cmd/goimports@v0.44.0
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          go install golang.org/x/exp/cmd/apidiff@${APIDIFF_VERSION}

      - name: Verify module metadata
        shell: bash
        run: |
          set -euo pipefail
          go mod download
          go mod verify
          go mod tidy -diff

      - name: Verify formatting and fixes
        shell: bash
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          test -z "${unformatted}"
          go fix -diff ./... | tee /tmp/go-fix.diff
          test ! -s /tmp/go-fix.diff
          git diff --exit-code -- .

      - name: Run vet
        run: go vet ./...

      - name: Check public API and CLI contracts
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/check-contracts.sh
          api_baseline=v1.0.0-rc.3
          if [[ "${GITHUB_REF_NAME}" != "v1.0.0" ]] && git rev-parse --verify 'v1.0.0^{commit}' >/dev/null 2>&1; then
            api_baseline=v1.0.0
          fi
          ./scripts/check-api-compat.sh "${api_baseline}" "${api_baseline}"

      - name: Run pinned lint
        run: ./scripts/lint.sh

      - name: Run pinned vulnerability scan
        run: govulncheck ./...

      - name: Run unit and integration tests
        shell: bash
        run: |
          set -euo pipefail
          packages="$(go list ./... | grep -v /e2e)"
          go test ${packages} -race -coverprofile=coverage.txt -covermode=atomic

      - name: Run full end-to-end and scaffold suite
        run: go test ./e2e/... -v -timeout 55m

      - name: Confirm validation did not mutate tracked source
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- .
          git diff --cached --exit-code -- .

  preflight:
    name: Build private preflight artifacts
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out the validated tag commit
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pinned Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
          cache: true
          cache-dependency-path: go.sum

      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1, Cosign v3.0.5

      - name: Install pinned Syft
        uses: anchore/sbom-action/download-syft@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1, Syft v1.42.2

      - name: Check GoReleaser configuration
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: check

      - name: Build without publishing
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean --skip=publish

      - name: Sign the SBOM checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          find dist -maxdepth 1 -type f -name '*.sbom.json' -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#  dist/#  #' > dist/sbom-checksums.txt
          cosign sign-blob \
            --bundle dist/sbom-checksums.txt.sigstore.json \
            --yes \
            dist/sbom-checksums.txt

      - name: Verify the four-artifact matrix
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          for target in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            archive="dist/andurel_${version}_${target}.tar.gz"
            test -f "${archive}"
            test -f "${archive}.sbom.json"
          done
          test "$(find dist -maxdepth 1 -type f -name 'andurel_*.tar.gz' | wc -l)" -eq 4
          test -f dist/checksums.txt
          test -f dist/checksums.txt.sigstore.json
          test -f dist/sbom-checksums.txt.sigstore.json

      - name: Confirm packaging did not mutate tracked source
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- .
          git diff --cached --exit-code -- .

      - name: Upload private preflight artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: preflight-release-assets-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 1

  preflight-smoke:
    name: Preflight smoke ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: preflight
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
          - goos: darwin
            goarch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out smoke-test fixtures
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Download private preflight artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: preflight-release-assets-${{ github.sha }}
          path: dist

      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1, Cosign v3.0.5

      - name: Install and smoke-test archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          ./scripts/smoke-release-archive.sh \
            "dist/andurel_${version}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" \
            "${GITHUB_REF_NAME}" \
            dist

  draft-release:
    name: Create signed private draft
    needs: preflight-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out the validated tag commit
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Reverify release tag identity before draft creation
        shell: bash
        run: ./scripts/verify-release-tag.sh "${GITHUB_REF_NAME}" "${GITHUB_SHA}"

      - name: Set up pinned Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
          cache: true
          cache-dependency-path: go.sum

      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1, Cosign v3.0.5

      - name: Install pinned Syft
        uses: anchore/sbom-action/download-syft@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1, Syft v1.42.2

      - name: Refuse to replace an existing release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "A release already exists for ${GITHUB_REF_NAME}; refusing to replace it." >&2
            exit 1
          fi

      - name: Check GoReleaser configuration
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: check

      - name: Create signed private draft with GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Sign and upload the SBOM checksum manifest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          find dist -maxdepth 1 -type f -name '*.sbom.json' -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#  dist/#  #' > dist/sbom-checksums.txt
          cosign sign-blob \
            --bundle dist/sbom-checksums.txt.sigstore.json \
            --yes \
            dist/sbom-checksums.txt
          gh release upload "${GITHUB_REF_NAME}" \
            dist/sbom-checksums.txt \
            dist/sbom-checksums.txt.sigstore.json

      - name: Attest release archives
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-checksums: dist/checksums.txt

      - name: Attest release SBOMs
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-checksums: dist/sbom-checksums.txt

      - name: Confirm release preparation did not mutate tracked source
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- .
          git diff --cached --exit-code -- .

  exact-artifact-smoke:
    name: Exact release smoke ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: draft-release
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
          - goos: darwin
            goarch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Check out smoke-test fixtures
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1, Cosign v3.0.5

      - name: Download exact draft assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir release-assets
          gh release download "${GITHUB_REF_NAME}" --dir release-assets

      - name: Install and smoke-test exact release archive
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="release-assets/andurel_${version}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          ./scripts/smoke-release-archive.sh "${archive}" "${GITHUB_REF_NAME}" release-assets
          gh attestation verify "${archive}" --repo "${GITHUB_REPOSITORY}"
          gh attestation verify "${archive}.sbom.json" --repo "${GITHUB_REPOSITORY}"

  publish:
    name: Publish verified release
    needs: exact-artifact-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out the exact tag commit
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Publish only the verified draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ./scripts/verify-release-tag.sh "${GITHUB_REF_NAME}" "${GITHUB_SHA}"
          test "$(gh release view "${GITHUB_REF_NAME}" --json isDraft --jq .isDraft)" = "true"
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            gh release edit "${GITHUB_REF_NAME}" --draft=false --prerelease
          else
            gh release edit "${GITHUB_REF_NAME}" --draft=false --prerelease=false
          fi
