name: Code Coverage

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgres://postgres:postgres@localhost:5432/testdb?sslmode=disable"
      E2E_CRITICAL_ONLY: "true"

    steps:
    - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

    - name: Set up pinned Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.5'
        check-latest: false
        cache: true
        cache-dependency-path: go.sum

    - name: Install pinned test tools
      run: |
        go install github.com/a-h/templ/cmd/templ@v0.3.1020
        go install github.com/segmentio/golines@v0.13.0
        go install golang.org/x/tools/cmd/goimports@v0.44.0

    - name: Run canonical race and coverage command
      run: |
        set -euo pipefail
        packages="$(go list ./... | grep -v /e2e)"
        go test ${packages} -race -covermode=atomic -coverpkg=./... -coverprofile=coverage.out
        go tool cover -func=coverage.out -o coverage-summary.out
        awk '/^total:/ {printf "total statement coverage: %s\n", $3; found=1} END {exit !found}' coverage-summary.out

    - name: Go Coverage Badge
      uses: tj-actions/coverage-badge-go@v2
      with:
        green: 80
        filename: coverage-summary.out

    - name: Create pull request for coverage badge update
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ github.token }}
        base: master
        commit-message: "ci: update coverage badge"
        branch: "ci/coverage-badge"
        delete-branch: true
        title: "ci: update coverage badge"
        body: |
          Automated coverage badge update from the Code Coverage workflow.
        add-paths: |
          README.md
