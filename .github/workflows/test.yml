name: Test

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    env:
      E2E_CRITICAL_ONLY: "true"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.5'
        check-latest: true

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Install tools
      run: |
        go install github.com/a-h/templ/cmd/templ
        go install github.com/segmentio/golines
        go install golang.org/x/tools/cmd/goimports

    - name: Run go vet
      run: go vet ./...

    - name: Run tests with canonical coverage
      run: ./scripts/coverage.sh

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@e53489f4d376d79066609109e7a95a29eb3740b1 # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.out
        disable_search: true
        flags: unit
        fail_ci_if_error: true

    - name: Run E2E critical tests
      run: go test ./e2e/... -v -timeout 25m

    - name: Upload E2E failure artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-pr-failures
        path: |
          /tmp/andurel-e2e-*
        retention-days: 7
