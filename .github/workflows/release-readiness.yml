name: Release Readiness

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_call:

permissions:
  contents: read

env:
  GO_VERSION: '1.26.5'
  GOLANGCI_LINT_VERSION: 'v2.12.2'
  GOVULNCHECK_VERSION: 'v1.3.0'
  APIDIFF_VERSION: 'v0.0.0-20250620022241-b7579e27df2b'

jobs:
  readiness:
    name: Release Readiness
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17.5-alpine3.22
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb?sslmode=disable

    steps:
      - name: Check out the exact commit
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pinned Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
          cache: true
          cache-dependency-path: go.sum

      - name: Install pinned validation tools
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/a-h/templ/cmd/templ@v0.3.1020
          go install github.com/segmentio/golines@v0.13.0
          go install golang.org/x/tools/cmd/goimports@v0.44.0
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          go install golang.org/x/exp/cmd/apidiff@${APIDIFF_VERSION}

      - name: Verify module metadata
        shell: bash
        run: |
          set -euo pipefail
          go mod download
          go mod verify
          go mod tidy -diff

      - name: Verify formatting and fixes
        shell: bash
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          test -z "${unformatted}"
          go fix -diff ./... | tee /tmp/go-fix.diff
          test ! -s /tmp/go-fix.diff
          git diff --exit-code -- .

      - name: Run vet
        run: go vet ./...

      - name: Check public API and CLI contracts
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          ./scripts/check-contracts.sh
          api_base="${PR_BASE_SHA:-v1.0.0}"
          ./scripts/check-api-compat.sh "${api_base}" v1.0.0
          ./scripts/release_tag_policy_test.sh

      - name: Run pinned lint
        run: ./scripts/lint.sh

      - name: Run pinned vulnerability scan
        run: govulncheck ./...

      - name: Run unit and integration tests with race detection and report coverage
        shell: bash
        run: |
          set -euo pipefail
          packages="$(go list ./... | grep -v /e2e)"
          go test ${packages} -race -covermode=atomic -coverpkg=./... -coverprofile=coverage.out
          go tool cover -func=coverage.out -o coverage-summary.out
          awk '/^total:/ {printf "total statement coverage: %s\n", $3; found=1} END {exit !found}' coverage-summary.out

      - name: Run full end-to-end and scaffold suite
        run: go test ./e2e/... -v -timeout 55m

      - name: Upload end-to-end failure artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-readiness-e2e-failures-${{ github.sha }}
          path: /tmp/andurel-e2e-*
          if-no-files-found: ignore
          retention-days: 7

      - name: Confirm validation did not mutate tracked files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- .
          git diff --cached --exit-code -- .
