name: Nightly Test Suite

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test-full:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 75

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgres://postgres:postgres@localhost:5432/testdb?sslmode=disable"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install tools
        run: |
          go install github.com/a-h/templ/cmd/templ
          go install github.com/segmentio/golines
          go install golang.org/x/tools/cmd/goimports

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        run: |
          go test $(go list ./... | grep -v /e2e) -v -race -coverprofile=coverage.txt -covermode=atomic
          go tool cover -func coverage.txt | awk '/^total:/ {printf "total coverage: %s\n", $3; found=1} END {exit !found}'

      - name: Run E2E full test suite
        run: go test ./e2e/... -v -timeout 55m

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-nightly-failures
          path: |
            /tmp/andurel-e2e-*
          retention-days: 7

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Nightly Test Suite Failed',
              body: `The nightly test suite failed. Please check the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`,
              labels: ['nightly-failure', 'automated']
            })
