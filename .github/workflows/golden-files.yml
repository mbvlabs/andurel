name: Golden Files

on:
  pull_request:

jobs:
  golden-files:
    name: Check golden files
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Download dependencies
        run: go mod download

      - name: Install tools
        run: |
          go install github.com/a-h/templ/cmd/templ
          go install github.com/segmentio/golines
          go install golang.org/x/tools/cmd/goimports

      - name: Update golden files
        run: just update-golden-all

      - name: Check for golden file changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Golden files are out of date. Run 'just update-golden-all' locally and commit the changes."
            git status --short
            git diff -- .
            exit 1
          fi
